openai:
  api_key: "${OPENAI_API_KEY}"

  llm:
    model: "gpt-4o"
    temperature: 0.1
    max_retries: 5
    retry_base_delay: 1s

  image:
    model: "gpt-image-2"
    quality: "medium"
    size: "1024x1024"
    thinking: "medium"
    max_retries: 5
    retry_base_delay: 2s
    rate_limit_rpm: 5

pipeline:
  output_dir: "./comix-output"
  chapter_pattern: "chapter_*.md"
  cover_filename: "cover.md"
  max_concurrent_sheets: 3
  max_concurrent_poses: 2

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 60s
  shutdown_timeout: 15s

logging:
  level: "info"
  format: "text"
