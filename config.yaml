openai:
  api_key: "${OPENAI_API_KEY}"
  base_url: "https://api.openai.com/v1"

  llm:
    model: "gpt-5.4-mini"
    temperature: 0.1
    thinking: "medium"
    max_retries: 5
    retry_base_delay: 1s

  image:
    model: "gpt-image-2"
    quality: "medium"
    size:
      sheet: "2880x1920"
      poses: "2048x2048"
      panel: "1632x3808"
    thinking: "medium"
    max_retries: 5
    retry_base_delay: 2s

pipeline:
  output_dir: "./comix-output"
  chapter_pattern: "chapter_*.md"
  cover_filename: "cover.md"
  max_concurrent_sheets: 3
  max_concurrent_poses: 2

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 60s
  shutdown_timeout: 15s

logging:
  level: "info"
  format: "text"
